baseline_version: 1
updated_at: "2026-04-19"

baseline_kind: "primary"

reviewer_model_recommendation:
  model: "gpt-5.4"
  reasoning_effort: "xhigh"
  reason: "Routine review in this repo is boundary-heavy, defect-family oriented, and often spans lifecycle, recovery, persistence, and adapter seams."

alternative_baselines:
  - id: "m2-seams"
    name: "M2 Seam Review"
    purpose: "Finer seam-focused review for M2 attachment, recovery, CLI orchestration, and Codex adapter cleanup."
    path: "docs/review-baselines/m2-seams.yaml"
    when_to_use:
      - "targeted M2 maintainability cleanup by owning seam"
      - "reviews where commands.ts or reconciliation need cleaner ownership than the primary baseline provides"
      - "archaeology-informed seam reviews after broad branch inventory"

surfaces:
  - id: "runtime-authority"
    name: "Runtime Authority"
    purpose: "Review runtime-owned truth for assignments, attachments, claims, provenance, and projection semantics."
    primary_anchors:
      - "src/core/**"
      - "src/projections/**"
    supporting_anchors:
      - "src/cli/attachment-lifecycle.ts"
      - "src/__tests__/milestone-2-integration.test.ts"
      - "src/__tests__/host-run-recovery-matrix.test.ts"
    contract_docs:
      - "docs/runtime-state-model.md"
      - "docs/run-recovery-invariants.md"
      - "docs/architecture.md"
      - "docs/module-boundaries.md"
      - "docs/completed/milestone-2.md"
    configured_builtin_lenses:
      - lens_id: "authority"
        priority: "high"
        reason: "The runtime is the source of truth for attachment, claim, and provenance state."
      - lens_id: "lifecycle"
        priority: "high"
        reason: "Launch, reclaim, detach, release, and orphan transitions must stay coherent."
      - lens_id: "contract"
        priority: "high"
        reason: "Types and invariants must model the actual authority lifecycle."
      - lens_id: "defect-family"
        priority: "medium"
        reason: "Line-local truth violations often indicate broader authority drift."
    configured_custom_lenses:
      - id: "authority-batch-integrity"
        name: "Authority Batch Integrity"
        purpose: "Check that attachment and claim authority changes become durable through one coupled runtime mutation path."
        what_to_look_for: "Half-authoritative writes, side paths that mutate only the attachment or only the claim, and provenance drift across alternate paths."
        key_questions:
          - "Do attachment and claim transitions remain coupled through one durable mutation contract?"
          - "Do side paths preserve provenance and resumable-state invariants?"
        evidence_expectations:
          - "Runtime event or projection-mutation paths"
          - "Tests or docs covering attachment and claim transition rules"
        priority: "high"

  - id: "cli-operator-surfaces"
    name: "CLI Operator Surfaces"
    purpose: "Review operator-facing commands and user-visible CLI truth for status, inspect, run, resume, and doctor surfaces."
    primary_anchors:
      - "src/cli/commands.ts"
      - "src/cli/ctx.ts"
      - "src/cli/runtime-state.ts"
      - "src/cli/run-cancellation.ts"
    supporting_anchors:
      - "src/cli/types.ts"
      - "src/__tests__/cli.test.ts"
      - "src/__tests__/milestone-2-smoke.test.ts"
      - "src/__tests__/run-cancellation.test.ts"
      - "README.md"
    contract_docs:
      - "README.md"
      - "docs/architecture.md"
      - "docs/module-boundaries.md"
      - "docs/run-recovery-invariants.md"
    configured_builtin_lenses:
      - lens_id: "operator-truth"
        priority: "high"
        reason: "Operator surfaces must report reconciled runtime truth rather than raw adapter internals."
      - lens_id: "soc"
        priority: "high"
        reason: "The CLI should remain thin and avoid becoming a second lifecycle or recovery engine."
      - lens_id: "docs-tests"
        priority: "medium"
        reason: "CLI wording and test expectations frequently reinforce the user-visible contract."
      - lens_id: "defect-family"
        priority: "medium"
        reason: "Operator-visible glitches often point to broader reconciliation or authority issues."
    configured_custom_lenses:
      - id: "reconciled-operator-truth"
        name: "Reconciled Operator Truth"
        purpose: "Check that operator-visible CLI state is derived from repaired runtime truth and clearly labeled when host metadata is being shown."
        what_to_look_for: "Status or inspect output that mixes raw host-run artifacts with runtime authority, stale pre-repair reads, or misleading labels."
        key_questions:
          - "Does the command reflect reconciled runtime truth before presenting blockers or resumability?"
          - "If host-run metadata is shown, is it clearly presented as host state rather than runtime authority?"
        evidence_expectations:
          - "CLI output paths and formatting code"
          - "CLI tests or README examples"
        priority: "high"

  - id: "cli-lifecycle-reconciliation"
    name: "CLI Lifecycle And Reconciliation"
    purpose: "Review CLI-owned lifecycle mutation, reconciliation orchestration, and recovery-side durable mutation application."
    primary_anchors:
      - "src/cli/attachment-lifecycle.ts"
      - "src/cli/run-reconciliation.ts"
      - "src/cli/host-run-cleanup.ts"
      - "src/cli/projection-write.ts"
      - "src/cli/run-operations.ts"
    supporting_anchors:
      - "src/__tests__/host-run-recovery-matrix.test.ts"
      - "src/__tests__/milestone-2-integration.test.ts"
      - "src/__tests__/recovery.test.ts"
    contract_docs:
      - "docs/run-recovery-invariants.md"
      - "docs/runtime-state-model.md"
      - "docs/architecture.md"
      - "docs/module-boundaries.md"
      - "docs/completed/milestone-2-session-attachment-hardening.md"
    configured_builtin_lenses:
      - lens_id: "lifecycle"
        priority: "high"
        reason: "This seam applies launch, reclaim, finalization, and recovery-side state transitions."
      - lens_id: "soc"
        priority: "high"
        reason: "CLI-side lifecycle and reconciliation helpers are a recurring drift risk in this repo."
      - lens_id: "duplication"
        priority: "high"
        reason: "Split-brain between lifecycle and reconciliation helpers has caused repeated drift."
      - lens_id: "defect-family"
        priority: "high"
        reason: "The same root cause often appears across launch, reclaim, stale cleanup, and recovered completion."
      - lens_id: "authority"
        priority: "medium"
        reason: "CLI applies runtime-owned mutations and must not invent a second authority model."
    configured_custom_lenses:
      - id: "cli-reclaim-symmetry"
        name: "Reclaim Symmetry"
        purpose: "Check that launch, same-session reclaim, and recovery-side completion/failure paths stay behaviorally aligned except where reclaim genuinely differs."
        what_to_look_for: "Divergent finalization, duplicate blocking, cleanup, or failure handling between launch and reclaim paths."
        key_questions:
          - "Do launch and reclaim finalize through the same runtime-owned lifecycle rules?"
          - "If the paths differ, is the difference intentional, documented, and limited to same-session verification or host-specific reclaim facts?"
        evidence_expectations:
          - "Implementation paths for launch, reclaim, and recovery finalization"
          - "Tests or docs proving the intended asymmetry"
        priority: "high"
      - id: "cli-seam-placement"
        name: "Seam Placement"
        purpose: "Check that extracted orchestration seams live in the correct owning layer rather than preserving behavior in the wrong module."
        what_to_look_for: "New services or helpers placed where they force reverse imports, layer inversion, or blurred ownership."
        key_questions:
          - "Does the seam placement match the documented module boundary and dependency direction?"
          - "Did the extraction remove drift, or only move it into a new but still incorrect layer?"
        evidence_expectations:
          - "Import graph and module placement"
          - "Module-boundary docs and test coverage for the seam"
        priority: "high"

  - id: "persistence-recovery"
    name: "Persistence And Recovery"
    purpose: "Review durable event and snapshot recovery, replay and repair behavior, and pure recovery helpers that derive actionable state without owning CLI mutation."
    primary_anchors:
      - "src/persistence/**"
      - "src/recovery/**"
    supporting_anchors:
      - "src/__tests__/persistence.test.ts"
      - "src/__tests__/recovery.test.ts"
    contract_docs:
      - "docs/architecture.md"
      - "docs/runtime-state-model.md"
      - "docs/run-recovery-invariants.md"
      - "docs/module-boundaries.md"
    configured_builtin_lenses:
      - lens_id: "recovery"
        priority: "high"
        reason: "Replay, repair, fallback, and recovery correctness are the core contract of this layer."
      - lens_id: "contract"
        priority: "high"
        reason: "Snapshot fallback and replay rules are documented explicitly and are easy to violate subtly."
      - lens_id: "soc"
        priority: "high"
        reason: "Persistence must not absorb lifecycle or adapter policy."
      - lens_id: "authority"
        priority: "medium"
        reason: "Recovery must preserve runtime-owned truth without inventing new authority."
    configured_custom_lenses:
      - id: "persistence-artifact-role-discipline"
        name: "Artifact Role Discipline"
        purpose: "Check that event log, snapshot, run record, active lease, and last-run pointer keep their distinct roles and do not leak authority."
        what_to_look_for: "Snapshot-only truth treated like event-backed authority, lease metadata treated like runtime truth, or pointer convenience state treated as exclusivity."
        key_questions:
          - "Do artifact roles remain distinct under replay, fallback, repair, and inspection?"
          - "Does malformed or incomplete durable state degrade without inventing false authority?"
        evidence_expectations:
          - "Persistence and recovery code paths"
          - "Invariant docs or matrix tests covering artifact precedence"
        priority: "high"

  - id: "shared-host-run-infra"
    name: "Shared Host-Run Infrastructure"
    purpose: "Review shared adapter contracts, lease-backed host-run persistence, shared session coordination, and generic inspection materialization."
    primary_anchors:
      - "src/adapters/**"
    supporting_anchors:
      - "src/__tests__/adapter-contract.test.ts"
      - "src/__tests__/host-run-session.test.ts"
      - "src/__tests__/host-run-store.test.ts"
    contract_docs:
      - "docs/module-boundaries.md"
      - "docs/host-adapters.md"
      - "docs/run-recovery-invariants.md"
      - "docs/architecture.md"
    configured_builtin_lenses:
      - lens_id: "contract"
        priority: "high"
        reason: "The shared adapter surface must expose host facts without owning runtime truth."
      - lens_id: "soc"
        priority: "high"
        reason: "Shared adapter infrastructure is vulnerable to turning into a dumping ground."
      - lens_id: "intent-drift"
        priority: "high"
        reason: "Host-run infrastructure has repeatedly grown beyond its original scope."
      - lens_id: "recovery"
        priority: "medium"
        reason: "Lease, inspection, and session infrastructure are part of interruption and recovery correctness."
      - lens_id: "duplication"
        priority: "medium"
        reason: "Launch and resume session loops can easily drift when similar mechanics are reassembled locally."
    configured_custom_lenses:
      - id: "shared-artifact-role-discipline"
        name: "Artifact Role Discipline"
        purpose: "Check that shared host-run helpers expose durable artifact facts without deciding runtime lifecycle meaning."
        what_to_look_for: "Repository helpers that normalize or reinterpret malformed, stale, or completed artifacts into higher-level runtime policy."
        key_questions:
          - "Does the repository layer stop at durable host-run artifact facts?"
          - "Are higher-level stale or malformed interpretations happening outside the repository seam?"
        evidence_expectations:
          - "Repository and shared inspection code"
          - "Invariant docs or tests covering host-run artifact precedence"
        priority: "high"
      - id: "shared-seam-placement"
        name: "Seam Placement"
        purpose: "Check that extracted host-run services live in the shared adapter layer only when they are genuinely host-generic."
        what_to_look_for: "Codex-specific parsing or verification drifting into shared infrastructure, or shared services left in host-specific modules."
        key_questions:
          - "Is the shared seam generic enough to belong under adapters?"
          - "Did extraction reduce duplication without moving host-specific behavior into shared code?"
        evidence_expectations:
          - "Module placement and imports"
          - "Boundary docs and tests for shared adapter behavior"
        priority: "high"

  - id: "codex-reference-adapter"
    name: "Codex Reference Adapter"
    purpose: "Review Codex-specific launch, resume, profile, kernel, and host-native parsing behavior without allowing Codex concerns to leak into runtime truth."
    primary_anchors:
      - "src/hosts/codex/adapter/index.ts"
      - "src/hosts/codex/adapter/cli.ts"
      - "src/hosts/codex/adapter/types.ts"
      - "src/hosts/codex/kernel/**"
      - "src/hosts/codex/profile/**"
    supporting_anchors:
      - "src/hosts/codex/adapter/envelope.ts"
      - "src/hosts/codex/adapter/prompt.ts"
      - "src/hosts/codex/adapter/execution.ts"
      - "src/__tests__/codex-cli-runner.test.ts"
      - "src/__tests__/milestone-2-live-harness.test.ts"
      - "src/__tests__/milestone-2-smoke.test.ts"
    contract_docs:
      - "docs/codex-profile-integration.md"
      - "docs/codex-run-recovery-mapping.md"
      - "docs/host-adapters.md"
      - "docs/module-boundaries.md"
      - "docs/completed/milestone-2-session-attachment-hardening.md"
    configured_builtin_lenses:
      - lens_id: "contract"
        priority: "high"
        reason: "The Codex adapter must surface host-native facts without redefining runtime-owned behavior."
      - lens_id: "lifecycle"
        priority: "high"
        reason: "Codex launch and reclaim behavior must align with the shared runtime lifecycle contract."
      - lens_id: "docs-tests"
        priority: "high"
        reason: "Codex-specific docs are normative enough that drift between code and docs is risky."
      - lens_id: "soc"
        priority: "medium"
        reason: "Codex-only concerns should stay isolated from shared adapter infrastructure."
    configured_custom_lenses:
      - id: "codex-reclaim-symmetry"
        name: "Reclaim Symmetry"
        purpose: "Check that the Codex-specific wrapped resume path stays behaviorally aligned with wrapped launch except for same-session verification."
        what_to_look_for: "Codex-only divergences in finalization, persistence, cleanup, or duplicate blocking that are not explained by same-session reclaim requirements."
        key_questions:
          - "Is the Codex resume path aligned with launch on runtime-owned persistence and finalization?"
          - "Are remaining differences explicitly host-native and documented?"
        evidence_expectations:
          - "Codex adapter launch and resume code paths"
          - "Codex integration docs or tests"
        priority: "high"

  - id: "envelope-telemetry"
    name: "Envelope And Telemetry"
    purpose: "Review bounded envelope construction, trimming discipline, structured output capture, and host-neutral telemetry normalization."
    primary_anchors:
      - "src/hosts/codex/adapter/envelope.ts"
      - "src/hosts/codex/adapter/prompt.ts"
      - "src/hosts/codex/adapter/execution.ts"
      - "src/telemetry/**"
      - "src/config/**"
    supporting_anchors:
      - "src/__tests__/trimming.test.ts"
      - "README.md"
    contract_docs:
      - "docs/telemetry.md"
      - "docs/codex-profile-integration.md"
      - "README.md"
    configured_builtin_lenses:
      - lens_id: "contract"
        priority: "high"
        reason: "Envelope and telemetry rules are specified directly in docs and are easy to regress with host-specific shortcuts."
      - lens_id: "docs-tests"
        priority: "medium"
        reason: "Examples and trimming tests are the main enforcement points for this surface."
      - lens_id: "soc"
        priority: "medium"
        reason: "Envelope shaping and telemetry normalization should not leak into runtime truth."
      - lens_id: "operator-truth"
        priority: "low"
        reason: "Derived operator-facing summaries should still reflect bounded and normalized data rather than raw host output."
    configured_custom_lenses:
      - id: "bounded-envelope"
        name: "Bounded Envelope"
        purpose: "Check that prompt-facing state stays bounded through trimming, brief compaction, and artifact substitution."
        what_to_look_for: "Large raw data flowing into envelopes, missing trimming checks, or loss of artifact references when data is compacted."
        key_questions:
          - "Does envelope construction keep prompt-facing state bounded even on large outputs?"
          - "When trimming occurs, are references or persisted artifacts preserved clearly enough for recovery or inspection?"
        evidence_expectations:
          - "Envelope and prompt-construction code"
          - "Trimming tests or telemetry fields proving size and trimming behavior"
        priority: "high"

  - id: "workflow-extension-boundaries"
    name: "Workflow And Extension Boundaries"
    purpose: "Review placeholder workflow, backend, and extension areas so they stay thin and do not accumulate hidden truth or orchestration."
    primary_anchors:
      - "src/workflows/**"
      - "src/backends/**"
    supporting_anchors:
      - "src/__tests__/architecture-boundaries.test.ts"
    contract_docs:
      - "docs/module-boundaries.md"
      - "docs/coortex-roadmap.md"
      - "docs/scope.md"
    configured_builtin_lenses:
      - lens_id: "intent-drift"
        priority: "high"
        reason: "These placeholder areas should stay narrow until the roadmap intentionally expands them."
      - lens_id: "soc"
        priority: "high"
        reason: "Workflow and backend placeholders should not quietly become hidden orchestration or truth layers."
      - lens_id: "contract"
        priority: "medium"
        reason: "The roadmap and scope docs define what is intentionally in and out of scope here."
    configured_custom_lenses: []

  - id: "foundations-and-wiring"
    name: "Foundations And Wiring"
    purpose: "Review shared utility helpers and top-level entry wiring that can subtly affect multiple layers without owning domain behavior."
    primary_anchors:
      - "src/utils/**"
      - "src/index.ts"
    supporting_anchors:
      - "README.md"
    contract_docs:
      - "docs/architecture.md"
      - "docs/module-boundaries.md"
      - "README.md"
    configured_builtin_lenses:
      - lens_id: "contract"
        priority: "high"
        reason: "Serialization, time, and entry wiring can change cross-layer behavior even when they do not own domain truth."
      - lens_id: "duplication"
        priority: "medium"
        reason: "Utility seams are prone to ad hoc helper growth and inconsistent reuse."
      - lens_id: "soc"
        priority: "medium"
        reason: "Shared helpers should stay foundational and not accumulate hidden policy."
    configured_custom_lenses: []
