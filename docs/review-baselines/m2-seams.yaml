baseline_version: 1
updated_at: '2026-04-19'
baseline_kind: variant
variant_strategy: derived
variant_id: m2-seams
variant_name: M2 Seam Review
variant_purpose: Review M2 maintainability and ownership debt by stable implementation
  seam instead of the primary baseline's broader horizontal surfaces.
variant_when_to_use:
- targeted M2 cleanup of attachment, recovery, CLI orchestration, or Codex adapter
  seams
- reviews where commands.ts and reconciliation need distinct owning surfaces
- archaeology-informed follow-up reviews after a broad branch inventory pass
derived_from: docs/review-baseline.yaml
reviewer_model_recommendation:
  model: gpt-5.4
  reasoning_effort: xhigh
  reason: Routine review in this repo is boundary-heavy, defect-family oriented, and
    often spans lifecycle, recovery, persistence, and adapter seams.
surfaces:
- id: runtime-authority
  name: Runtime Authority
  purpose: Review runtime-owned authority truth for attachments, claims, provenance,
    and projection integrity before CLI or adapter policy is applied.
  primary_anchors:
  - src/core/**
  - src/projections/**
  supporting_anchors:
  - src/cli/attachment-lifecycle.ts
  - src/__tests__/milestone-2-integration.test.ts
  - src/__tests__/host-run-recovery-matrix.test.ts
  contract_docs:
  - docs/runtime-state-model.md
  - docs/run-recovery-invariants.md
  - docs/architecture.md
  - docs/module-boundaries.md
  configured_builtin_lenses:
  - lens_id: authority
    priority: high
    reason: Runtime-owned attachment and claim truth is the root contract for M2.
  - lens_id: contract
    priority: high
    reason: Projection integrity and provenance rules are explicitly documented.
  - lens_id: defect-family
    priority: high
    reason: Authority bugs frequently appear as sibling malformed graphs rather than
      one-off lines.
  - lens_id: lifecycle
    priority: medium
    reason: Attachment states still need to remain coherent with claim state and provenance.
  configured_custom_lenses:
  - id: authority-batch-integrity
    name: Authority Batch Integrity
    purpose: Check that attachment and claim authority changes become durable through
      one coupled runtime mutation path.
    what_to_look_for: Half-authoritative writes, side paths that mutate only the attachment
      or only the claim, and provenance drift across alternate paths.
    key_questions:
    - Do attachment and claim transitions remain coupled through one durable mutation
      contract?
    - Do side paths preserve provenance and resumable-state invariants?
    evidence_expectations:
    - Runtime event or projection-mutation paths
    - Tests or docs covering attachment and claim transition rules
    priority: high
- id: cli-entry-and-operator-output
  name: CLI Entry And Operator Output
  purpose: Review thin CLI entrypoints and operator-visible status, inspect, resume,
    and cancellation output without re-owning lifecycle or recovery semantics.
  primary_anchors:
  - src/cli/ctx.ts
  - src/cli/runtime-state.ts
  - src/cli/run-cancellation.ts
  supporting_anchors:
  - src/cli/types.ts
  - src/__tests__/cli.test.ts
  - src/__tests__/milestone-2-smoke.test.ts
  - src/__tests__/run-cancellation.test.ts
  - README.md
  contract_docs:
  - README.md
  - docs/architecture.md
  - docs/module-boundaries.md
  - docs/run-recovery-invariants.md
  configured_builtin_lenses:
  - lens_id: operator-truth
    priority: high
    reason: Operator-visible state must be reconciled runtime truth, not raw host
      artifacts.
  - lens_id: soc
    priority: high
    reason: CLI entrypoints should stay thin and avoid becoming a second lifecycle
      engine.
  - lens_id: docs-tests
    priority: medium
    reason: CLI examples and tests reinforce the operator-facing contract.
  configured_custom_lenses:
  - id: reconciled-operator-truth
    name: Reconciled Operator Truth
    purpose: Check that operator-visible CLI state is derived from repaired runtime
      truth and clearly labeled when host metadata is being shown.
    what_to_look_for: Status or inspect output that mixes raw host-run artifacts with
      runtime authority, stale pre-repair reads, or misleading labels.
    key_questions:
    - Does the command reflect reconciled runtime truth before presenting blockers
      or resumability?
    - If host-run metadata is shown, is it clearly presented as host state rather
      than runtime authority?
    evidence_expectations:
    - CLI output paths and formatting code
    - CLI tests or README examples
    priority: high
- id: cli-command-orchestration
  name: CLI Command Orchestration
  purpose: Review commands.ts as the seam that prepares resume artifacts, coordinates
    wrapped run or reclaim work, and persists recovered operator artifacts.
  primary_anchors:
  - src/cli/commands.ts
  supporting_anchors:
  - src/__tests__/cli.test.ts
  - src/__tests__/milestone-2-integration.test.ts
  - docs/run-recovery-invariants.md
  contract_docs:
  - docs/architecture.md
  - docs/module-boundaries.md
  - docs/run-recovery-invariants.md
  - docs/completed/milestone-2-session-attachment-hardening.md
  configured_builtin_lenses:
  - lens_id: soc
    priority: high
    reason: commands.ts should coordinate owning seams rather than absorb lifecycle,
      recovery, and adapter policy directly.
  - lens_id: duplication
    priority: high
    reason: Resume, run, and recovered-outcome branches are prone to near-duplicate
      orchestration drift.
  - lens_id: defect-family
    priority: high
    reason: Line-local orchestration bugs in commands.ts often reflect broader seam-placement
      failures.
  - lens_id: operator-truth
    priority: medium
    reason: Recovered and prepared operator artifacts still shape what the user sees.
  configured_custom_lenses:
  - id: recovered-outcome-placement
    name: Recovered Outcome Placement
    purpose: Check whether recovered result or decision synthesis and envelope persistence
      live in the right owning seam rather than stale CLI glue.
    what_to_look_for: Recovered-execution helpers, envelope rebuild logic, or reconciliation
      synthesis staying in commands.ts after owning seams were extracted.
    key_questions:
    - Does commands.ts coordinate recovered outcomes, or does it still own recovered-result
      synthesis itself?
    - When recovered operator artifacts are rebuilt, do they come from the owning
      seam instead of compatibility glue inside commands.ts?
    evidence_expectations:
    - commands.ts orchestration helpers
    - Nearby owning seams and integration coverage for recovered outcomes
    priority: high
- id: attachment-lifecycle-mutation
  name: Attachment Lifecycle Mutation
  purpose: Review the shared lifecycle mutation facility that creates, activates,
    finalizes, detaches, releases, and orphans runtime attachment authority.
  primary_anchors:
  - src/cli/attachment-lifecycle.ts
  - src/cli/projection-write.ts
  - src/cli/host-run-cleanup.ts
  supporting_anchors:
  - src/__tests__/host-run-recovery-matrix.test.ts
  - src/__tests__/milestone-2-integration.test.ts
  - docs/run-recovery-invariants.md
  contract_docs:
  - docs/architecture.md
  - docs/module-boundaries.md
  - docs/runtime-state-model.md
  - docs/run-recovery-invariants.md
  - docs/completed/milestone-2-session-attachment-hardening.md
  configured_builtin_lenses:
  - lens_id: lifecycle
    priority: high
    reason: This seam is the runtime-owned authority mutation facility for launch,
      reclaim, finalization, and cleanup transitions.
  - lens_id: authority
    priority: high
    reason: Lifecycle writes must preserve attachment and claim truth rather than
      invent local authority rules.
  - lens_id: soc
    priority: high
    reason: Mutation coupling should stay in the lifecycle seam instead of spreading
      back into commands or recovery.
  - lens_id: defect-family
    priority: medium
    reason: Launch, detach, release, and orphan bugs often share one underlying lifecycle
      break.
  configured_custom_lenses:
  - id: finalization-coupling
    name: Finalization Coupling
    purpose: Check that release, detach, orphan, and finalization paths update attachment
      and claim state together through one owning mutation seam.
    what_to_look_for: Attachment-only finalization, claim-only finalization, or cleanup
      helpers that bypass the shared lifecycle mutation facility.
    key_questions:
    - Do finalization paths update attachment and claim truth together through one
      owning seam?
    - Are cleanup helpers preserving the same lifecycle coupling as launch and reclaim
      finalization?
    evidence_expectations:
    - Lifecycle mutation helpers and emitted runtime events
    - Tests or docs covering finalization, cleanup, and release behavior
    priority: high
- id: run-reconciliation-engine
  name: Run Reconciliation Engine
  purpose: Review stale-run reconciliation, provisional promotion, recovered completion
    handling, and other repair flows that rebuild actionable runtime state after interruption.
  primary_anchors:
  - src/cli/run-reconciliation.ts
  - src/cli/run-operations.ts
  supporting_anchors:
  - src/recovery/host-runs.ts
  - src/__tests__/host-run-recovery-matrix.test.ts
  - src/__tests__/recovery.test.ts
  - src/__tests__/milestone-2-integration.test.ts
  contract_docs:
  - docs/architecture.md
  - docs/module-boundaries.md
  - docs/runtime-state-model.md
  - docs/run-recovery-invariants.md
  - docs/completed/milestone-2-session-attachment-hardening.md
  configured_builtin_lenses:
  - lens_id: recovery
    priority: high
    reason: This seam rebuilds actionable current state after stale, interrupted,
      or completed host runs.
  - lens_id: lifecycle
    priority: high
    reason: Reconciliation should apply the same launch, reclaim, and finalization
      rules as the owning lifecycle facility.
  - lens_id: duplication
    priority: high
    reason: Recovered completion and stale cleanup logic are prone to copy-pasted
      sibling paths.
  - lens_id: defect-family
    priority: high
    reason: The same root cause tends to reappear across stale cleanup, recovered
      completion, and provisional promotion.
  configured_custom_lenses:
  - id: cli-reclaim-symmetry
    name: Reclaim Symmetry
    purpose: Check that launch, same-session reclaim, and recovery-side completion
      or failure paths stay behaviorally aligned except where reclaim genuinely differs.
    what_to_look_for: Divergent finalization, duplicate blocking, cleanup, or failure
      handling between launch and reclaim paths.
    key_questions:
    - Do launch and reclaim finalize through the same runtime-owned lifecycle rules?
    - If the paths differ, is the difference intentional, documented, and limited
      to same-session verification or host-specific reclaim facts?
    evidence_expectations:
    - Implementation paths for launch, reclaim, and recovery finalization
    - Tests or docs proving the intended asymmetry
    priority: high
- id: persistence-recovery
  name: Persistence And Recovery
  purpose: Review event-log replay, snapshot fallback, repair behavior, and recovery
    helpers that derive actionable state without owning CLI mutation.
  primary_anchors:
  - src/persistence/**
  - src/recovery/**
  supporting_anchors:
  - src/__tests__/persistence.test.ts
  - src/__tests__/recovery.test.ts
  contract_docs:
  - docs/architecture.md
  - docs/runtime-state-model.md
  - docs/run-recovery-invariants.md
  - docs/module-boundaries.md
  configured_builtin_lenses:
  - lens_id: recovery
    priority: high
    reason: Replay, repair, fallback, and recovery correctness are the core contract
      of this layer.
  - lens_id: contract
    priority: high
    reason: Snapshot fallback and replay rules are explicitly documented and easy
      to violate subtly.
  - lens_id: soc
    priority: high
    reason: Persistence must not absorb lifecycle or adapter policy.
  - lens_id: authority
    priority: medium
    reason: Recovery must preserve runtime-owned truth without inventing new authority.
  configured_custom_lenses:
  - id: persistence-artifact-role-discipline
    name: Artifact Role Discipline
    purpose: Check that event log, snapshot, run record, active lease, and last-run
      pointer keep their distinct roles and do not leak authority.
    what_to_look_for: Snapshot-only truth treated like event-backed authority, lease
      metadata treated like runtime truth, or pointer convenience state treated as
      exclusivity.
    key_questions:
    - Do artifact roles remain distinct under replay, fallback, repair, and inspection?
    - Does malformed or incomplete durable state degrade without inventing false authority?
    evidence_expectations:
    - Persistence and recovery code paths
    - Invariant docs or matrix tests covering artifact precedence
    priority: high
- id: shared-host-run-infra
  name: Shared Host-Run Infrastructure
  purpose: Review shared adapter contracts, lease-backed host-run persistence, shared
    session coordination, and generic inspection materialization.
  primary_anchors:
  - src/adapters/contract.ts
  - src/adapters/host-run-inspection.ts
  - src/adapters/host-run-lease-repository.ts
  - src/adapters/host-run-records.ts
  - src/adapters/host-run-session-coordinator.ts
  - src/adapters/host-run-session.ts
  - src/adapters/host-run-store.ts
  supporting_anchors:
  - src/__tests__/adapter-contract.test.ts
  - src/__tests__/host-run-inspection.test.ts
  - src/__tests__/host-run-records.test.ts
  - src/__tests__/host-run-session.test.ts
  - src/__tests__/host-run-store.test.ts
  contract_docs:
  - docs/module-boundaries.md
  - docs/host-adapters.md
  - docs/run-recovery-invariants.md
  - docs/architecture.md
  configured_builtin_lenses:
  - lens_id: contract
    priority: high
    reason: The shared adapter surface must expose host facts without owning runtime
      truth.
  - lens_id: soc
    priority: high
    reason: Shared adapter infrastructure is vulnerable to turning into a dumping
      ground.
  - lens_id: recovery
    priority: medium
    reason: Lease, inspection, and session infrastructure are part of interruption
      and recovery correctness.
  - lens_id: duplication
    priority: high
    reason: Recent follow-on refactors show this seam still accumulates duplicated
      shaping and cleanup paths when shared owners are not reused consistently.
  configured_custom_lenses:
  - id: shared-artifact-role-discipline
    name: Artifact Role Discipline
    purpose: Check that shared host-run helpers expose durable artifact facts without
      deciding runtime lifecycle meaning.
    what_to_look_for: Repository helpers that normalize or reinterpret malformed,
      stale, or completed artifacts into higher-level runtime policy.
    key_questions:
    - Does the repository layer stop at durable host-run artifact facts?
    - Are higher-level stale or malformed interpretations happening outside the repository
      seam?
    evidence_expectations:
    - Repository and shared inspection code
    - Invariant docs or tests covering host-run artifact precedence
    priority: high
  - id: shared-seam-placement
    name: Seam Placement
    purpose: Check that extracted host-run services live in the shared adapter layer
      only when they are genuinely host-generic.
    what_to_look_for: Codex-specific parsing or verification drifting into shared
      infrastructure, or shared services left in host-specific modules.
    key_questions:
    - Is the shared seam generic enough to belong under adapters?
    - Did extraction reduce duplication without moving host-specific behavior into
      shared code?
    evidence_expectations:
    - Module placement and imports
    - Boundary docs and tests for shared adapter behavior
    priority: high
- id: codex-session-adapter
  name: Codex Session Adapter
  purpose: Review Codex-specific launch, wrapped resume, native session verification,
    and host-native parsing behavior without letting Codex own runtime truth.
  primary_anchors:
  - src/hosts/codex/adapter/index.ts
  - src/hosts/codex/adapter/cli.ts
  - src/hosts/codex/adapter/types.ts
  supporting_anchors:
  - src/hosts/codex/adapter/execution.ts
  - src/__tests__/adapter-contract.test.ts
  - src/__tests__/codex-cli-runner.test.ts
  - src/__tests__/milestone-2-live-harness.test.ts
  - src/__tests__/milestone-2-smoke.test.ts
  contract_docs:
  - docs/codex-profile-integration.md
  - docs/codex-run-recovery-mapping.md
  - docs/host-adapters.md
  - docs/module-boundaries.md
  - docs/completed/milestone-2-session-attachment-hardening.md
  configured_builtin_lenses:
  - lens_id: contract
    priority: high
    reason: The Codex adapter must surface host-native facts without redefining runtime-owned
      behavior.
  - lens_id: lifecycle
    priority: high
    reason: Codex launch and reclaim behavior must align with the shared runtime lifecycle
      contract.
  - lens_id: docs-tests
    priority: high
    reason: Codex-specific docs are normative enough that drift between code and docs
      is risky.
  - lens_id: soc
    priority: medium
    reason: Codex-only concerns should stay isolated from shared adapter infrastructure.
  configured_custom_lenses:
  - id: codex-reclaim-symmetry
    name: Reclaim Symmetry
    purpose: Check that the Codex-specific wrapped resume path stays behaviorally
      aligned with wrapped launch except for same-session verification.
    what_to_look_for: Codex-only divergences in finalization, persistence, cleanup,
      or duplicate blocking that are not explained by same-session reclaim requirements.
    key_questions:
    - Is the Codex resume path aligned with launch on runtime-owned persistence and
      finalization?
    - Are remaining differences explicitly host-native and documented?
    evidence_expectations:
    - Codex adapter launch and resume code paths
    - Codex integration docs or tests
    priority: high
- id: envelope-prompt-bounds
  name: Envelope Prompt Bounds
  purpose: Review bounded envelope construction, trimming discipline, structured output
    capture, and host-neutral telemetry normalization as their own stable seam.
  primary_anchors:
  - src/hosts/codex/adapter/envelope.ts
  - src/hosts/codex/adapter/prompt.ts
  - src/hosts/codex/adapter/execution.ts
  - src/telemetry/**
  - src/config/**
  supporting_anchors:
  - src/__tests__/trimming.test.ts
  - README.md
  contract_docs:
  - docs/telemetry.md
  - docs/codex-profile-integration.md
  - README.md
  configured_builtin_lenses:
  - lens_id: contract
    priority: high
    reason: Envelope and telemetry rules are specified directly in docs and are easy
      to regress with host-specific shortcuts.
  - lens_id: docs-tests
    priority: medium
    reason: Examples and trimming tests are the main enforcement points for this seam.
  - lens_id: soc
    priority: medium
    reason: Envelope shaping and telemetry normalization should not leak into runtime
      truth.
  - lens_id: operator-truth
    priority: low
    reason: Derived operator-facing summaries should still reflect bounded and normalized
      data rather than raw host output.
  configured_custom_lenses:
  - id: bounded-envelope
    name: Bounded Envelope
    purpose: Check that prompt-facing state stays bounded through trimming, brief
      compaction, and artifact substitution.
    what_to_look_for: Large raw data flowing into envelopes, missing trimming checks,
      or loss of artifact references when data is compacted.
    key_questions:
    - Does envelope construction keep prompt-facing state bounded even on large outputs?
    - When trimming occurs, are references or persisted artifacts preserved clearly
      enough for recovery or inspection?
    evidence_expectations:
    - Envelope and prompt-construction code
    - Trimming tests or telemetry fields proving size and trimming behavior
    priority: high
