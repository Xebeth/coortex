interface:
  display_name: "Implementation Coordinator"
  short_description: "Coordinate current-work implementation"
  default_prompt: "Use $implementation-coordinator to turn a normal implementation request into a reviewed current-work packet: keep a conversation-visible progress plan with update_plan, treat progress as non-blocking and not approval checkpoints, validate-current-work-packet and validate-current-work-review-output with the canonical installed .codex/skills/coortex-review helper as authoritative, use .codex/skills/implementation-coordinator/scripts/implementation_state.py paths, validate-handoff, validate-closeout, and write-closeout for current-work artifact paths, implementation handoff intake, and closeout accounting, treat helper failures as protocol error and do not reconstruct matrix checks by hand, delegation follows host policy and do not spawn subagents unless permitted, run spec review before implementation, require a structured implementation handoff using references/implementation-handoff.md, reject bare done or summary-only completion before return review, send rejects back to the same implementation lane, redirect structured review_handoff repair to $fixer-orchestrator, run the closing gate, produce closeout accounting with references/closeout-report.md, and do not commit unless explicitly allowed."
