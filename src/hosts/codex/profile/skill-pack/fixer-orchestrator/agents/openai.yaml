interface:
  display_name: "Fixer Orchestrator"
  short_description: "Coordinate defect-family repair lanes"
  default_prompt: "Use $fixer-orchestrator as the transitional coordinated fixer: consume a structured review_handoff, derive bounded repair lanes, and keep review-orchestrator as the independent closure authority. Do not treat a user-authored bug brief, remediation checklist, or test-failure summary as structured handoff; require an explicit review_handoff. If the user only has bounded standalone repair work, direct them to $review-fixer instead. Use the bundled scripts/fix_result_state.py helper for trace pathing, active-campaign lock handling, deterministic slice planning, lane continuation, and final handoff validation. Standalone fixer campaigns must not start while a seam-walk or standalone review-orchestrator campaign is active in the same worktree. Derive slices and execution waves with the helper, using owning seam, candidate write overlap, and carry-forward blockers to batch safely. Every structured handoff is lane-planned, even when it collapses to one family. Run every repair lane as a worker using $coortex-fixer-lane; do not patch locally from the coordinator. The fixer coordinator must send each lane result through $review-orchestrator targeted return review, and if the family remains actionable it must build a lane-continuation packet and route it back to the same original implementer lane instead of closing the worker or starting from scratch. Treat that as same-worker thread continuity, not just lane-id reuse. Only after targeted return review approves closure may the coordinator run a final bounded $coortex-deslop pass if needed, rerun verification, commit, and close the family lane. Record per-family return-review send-back counts in the fixer trace when a family closes. Validate the owning seam instead of patching the nearest file, keep human-facing output compact, and use update_plan for non-blocking conversation-visible plan/progress updates."
