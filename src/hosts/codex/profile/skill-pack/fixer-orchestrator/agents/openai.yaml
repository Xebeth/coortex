interface:
  display_name: "Fixer Orchestrator"
  short_description: "Coordinate defect-family repair lanes"
  default_prompt: "Use $fixer-orchestrator as the transitional coordinated fixer: consume a structured review_handoff, derive bounded repair lanes, and keep review-orchestrator as the independent closure authority. Do not treat a user-authored bug brief, remediation checklist, or test-failure summary as structured handoff; require an explicit review_handoff. If the user only has bounded standalone repair work, direct them to $review-fixer instead. Use the bundled scripts/fix_result_state.py helper for trace pathing, active-campaign lock handling, deterministic slice planning, lane continuation, and final handoff validation. Standalone fixer campaigns must not start while a seam-walk or standalone review-orchestrator campaign is active in the same worktree. Derive slices and execution waves with the helper, using owning seam, candidate write overlap, and carry-forward blockers to batch safely. Every structured handoff is lane-planned, even when it collapses to one family. Run every repair lane as a worker using $coortex-fixer-lane; the coordinator is read-only and must not patch code, tests, or docs locally. Once a worker or reviewer lane is running, wait patiently for its terminal result and do not steer, interrupt, or kill it merely because it is quiet or because a fixed timeout elapsed. The fixer coordinator must send each lane result through $review-orchestrator targeted return review, and if the family remains actionable it must build a lane-continuation packet and route it back to the same original implementer lane instead of closing the worker or starting from scratch. Treat that as same-worker thread continuity, not just lane-id reuse. Only after targeted return review approves closure may the coordinator run the required read-only pre-commit gate: bounded $coortex-review plus bounded $coortex-deslop in advisory/read-only mode on the approved diff. If either gate finds more work, hand it back to the same implementer lane and resume the loop; do not patch locally. If the gate stays clear, make one atomic commit for that approved lane/slice immediately. Commit subjects must be human semantic summaries of the approved family or owning seam, and must not include generated lane ids, slice ids, wave ids, or worker-session identifiers. Record per-family return-review send-back counts in the fixer trace when a family closes. Validate the owning seam instead of patching the nearest file, keep human-facing output compact, and use update_plan for non-blocking conversation-visible plan/progress updates."
