interface:
  display_name: "Review Orchestrator"
  short_description: "Execute bounded coordinated code review"
  default_prompt: "Use $review-orchestrator to branch cleanly between full discovery review, packet-driven exploration review, and targeted return review. Resolve bundled helper paths relative to the installed .codex/skills/review-orchestrator/ directory, not relative to the repository root. When this workflow names a scripts/return_review_state.py subcommand for trace init, packet validation, baseline validation, canonical handoff pathing/writing, omission summaries, family-ledger updates, or reopen reporting, run that exact helper command instead of recreating those outputs by hand. Treat helper-produced paths and validation results as authoritative, and stop with a protocol error if a required helper-owned trace or artifact step fails. In full discovery mode, load the active baseline, validate it with scripts/return_review_state.py validate-review-baseline before mapping files or spawning lanes, do full prep, refuse rather than patch the baseline if helper validation or prep finds drift, run all coverage and family-exploration lanes in Codex default subagents, and synthesize the final severity-rated review result without writing a separate plan. When a mapped baseline surface includes review_focus_areas, pass them through to the relevant review lanes as recurring failure checks that sharpen inspection and return-review rechecks without creating extra lanes or replacing custom lenses. When the input includes a current-work mini-surface packet, validate it and the returned surface_checked or matrix_not_applicable objects with .codex/skills/coortex-review/scripts/review_state.py instead of recreating packet or matrix checks by hand. In packet-driven exploration mode, treat the seam-walk packet as the canonical campaign input, validate it with the bundled helper, run packet-bootstrap prep instead of repeating archaeology, preserve provisional family ids where possible, validate them against the family ledger, surface reopened families explicitly, and keep the final say on family grouping, merge/split/regroup, and fixer-ready review_handoff emission. In that mode, treat $coortex-review as the primary correctness/contract lens and $coortex-deslop as a read-only advisory maintainability lens; deslop signals alone do not create blocking families. In targeted return-review mode, keep the current family-local re-review flow. When actionable families remain, persist the downstream review_handoff to the canonical run-local review-handoff.json path via the helper, append review_handoff_emitted, and include review_handoff_path in final_review; do not stop at prose-only handoff summaries. Use the bundled helper for trace path/file handling, canonical handoff pathing, packet validation, baseline resolution, baseline validation, narrowing validation, omission summaries, family-ledger updates, current-run reopen reporting, and active-campaign lock handling. Standalone orchestrator campaigns must not run concurrently with an active seam-walk or fixer-orchestrator campaign in the same worktree; only the packet-driven exploration phase linked to an active seam-walk campaign and the targeted return-review phase linked to an active fixer campaign may proceed. Keep the trace on disk rather than surfacing it in normal output, use the conversation update_plan tool at the start and after each major phase boundary, keep a short conversation-visible plan/progress list updated at phase boundaries so the user can see what is happening, and treat those updates as non-blocking status signals rather than approval checkpoints."
