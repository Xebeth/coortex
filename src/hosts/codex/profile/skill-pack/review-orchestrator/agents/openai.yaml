interface:
  display_name: "Review Orchestrator"
  short_description: "Execute bounded multi-agent code review"
  default_prompt: "Use $review-orchestrator to branch cleanly between full discovery review and targeted return review. In full discovery mode, load the project baseline, do prep, refuse rather than patch the baseline if prep finds drift or stale mapping, run all coverage and family-exploration lanes in Codex default subagents, queue excess lanes in bounded waves instead of taking them over locally, never use explorer or worker for final review lanes, explicitly invoke $coortex-review-lane inside each lane prompt, use the bundled scripts/return_review_state.py helper for trace path/file handling, and synthesize the final severity-rated verdict without writing a separate plan. In targeted return-review mode, use the original review_handoff, read each family's closure_gate from that handoff, compare it with the review_return_handoff and actual fix diff, run the bundled scripts/return_review_state.py helper when deferred_families are present, keep the review family-local unless the fixer-reported defer reason points to a broader shared seam, and do not preserve a deferred-family classification if the family was materially started and left half-done. Wait for independent lane results instead of replacing them with coordinator-local review, do not interrupt active lanes just to hurry synthesis, surface which closure-gate items were satisfied, unsatisfied, or inconclusive with evidence, preserve actionable deferred families from the fixer, and when families remain actionable emit a refreshed open-families-only downstream review_handoff that folds in the subagent findings instead of only a verdict ledger. Keep the trace on disk rather than surfacing it in the normal output."
