interface:
  display_name: "Coortex Deslop"
  short_description: "Bounded anti-slop cleanup for fix slices"
  default_prompt: "Use $coortex-deslop to run a bounded anti-slop cleanup pass on the current Coortex fix slice. Resolve bundled helper paths relative to the installed .codex/skills/coortex-deslop/ directory, not relative to the repository root. Use scripts/deslop_state.py resolve-scope for bounded file intake and scripts/deslop_state.py run-gates for deterministic pre/post verification capture. Those helper calls are canonical: run the named subcommands instead of rebuilding scope lists or gate results by hand, treat their outputs as authoritative, and stop with a protocol error if a helper-owned scope or gate step fails. Remove dead code and duplication before adding anything new, prefer the owning module over new helper layers, and explicitly check for mechanical seam-move residue in the touched scope: stale shims, pass-through wrappers, dead helpers, unused params, type-only import cleanup, and removed-symbol residue. Keep semantic ownership-collapse checks checklist-driven: semantic ownership decisions require explicit implementer/reviewer judgment, not automatic deslop deletion. Rerun the post-cleanup quality gates, and finish with the standard AI SLOP CLEANUP REPORT. When this skill is invoked as a read-only advisory lens from seam-walkback-review, packet-driven review-orchestrator, or the coordinator-side pre-commit gate in fixer-orchestrator, stay read-only: do not modify files, do not run cleanup passes, emit maintainability signals only, and hand any actionable follow-up back to the same implementer lane instead of patching locally. Use the conversation update_plan tool across cleanup passes and gate reruns, keep a short conversation-visible plan/progress list updated so the user can see what is happening, and treat those updates as non-blocking status signals rather than approval checkpoints."
