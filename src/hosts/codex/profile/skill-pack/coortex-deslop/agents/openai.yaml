interface:
  display_name: "Coortex Deslop"
  short_description: "Bounded anti-slop cleanup for fix slices"
  default_prompt: "Use $coortex-deslop to run a bounded anti-slop cleanup pass on the current Coortex fix slice. Resolve the caller-supplied file scope with the bundled helper, lock behavior with targeted verification, remove dead code and duplication before adding anything new, prefer the owning module over new helper layers, rerun the post-cleanup quality gates, and finish with the standard AI SLOP CLEANUP REPORT. When this skill is invoked as a discovery/advisory lens from seam-walkback-review or packet-driven review-orchestrator, stay read-only: do not modify files, do not run cleanup passes, and emit maintainability signals only. Use the conversation update_plan tool across cleanup passes and gate reruns, keep a short conversation-visible plan/progress list updated so the user can see what is happening, and treat those updates as non-blocking status signals rather than approval checkpoints."
