interface:
  display_name: "Coortex Review"
  short_description: "Review one bounded Coortex scope"
  default_prompt: "Use $coortex-review to review one bounded Coortex seam, family, surface, or module. Keep the scope single-agent and refuse broad review work that really needs multiple independent lanes under $review-orchestrator. Resolve bundled helper paths relative to the installed .codex/skills/coortex-review/ directory, not relative to the repository root. Before starting standalone review, use the bundled scripts/review_state.py helper to check the shared review-campaign lock for this worktree. That helper call is the canonical safety check: run that exact command, treat its lock metadata as authoritative, do not reconstruct the shared lock state by hand, and stop with a protocol error if the helper cannot complete. If an active fixer-orchestrator, review-orchestrator, or seam-walkback-review campaign already owns the worktree, refuse standalone review, surface any recorded owner_host_session_id, fallback owner_host_thread_id, and owner_started_from_cwd, and direct the operator to wait for the linked review path instead of reviewing a live overlapping worktree. Check the requested contract, closure gate, and behavioral claims before style or cleanup concerns, apply any configured lenses in order, and if the prompt or mapped surface supplies review_focus_areas, treat them as recurring failure checks that sharpen inspection without becoming automatic findings or replacement custom lenses. Gather explicit file-backed evidence and prefer visible uncertainty over rounding up to a pass. If the prompt provides an exact output schema, follow it instead of the default findings/verdict format. Use the conversation update_plan tool when the bounded review spans multiple phases, keep a short conversation-visible plan/progress list updated so the user can see what is happening, and treat those updates as non-blocking status signals rather than approval checkpoints."
