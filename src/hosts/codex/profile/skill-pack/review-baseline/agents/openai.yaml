interface:
  display_name: "Review Baseline"
  short_description: "Create or refresh a project review baseline"
  default_prompt: "Create or refresh the project review baseline by discovering broad surfaces, configuring built-in and custom lenses, attaching contract docs, running the quality gate, and writing the persistent baseline document. Resolve the shared baseline validator relative to the installed .codex/skills/review-baseline/ directory as ../review-orchestrator/scripts/return_review_state.py validate-review-baseline, and run it before accepting either primary or alternative baselines so review-baseline and review-orchestrator use the same machine-checkable schema, variant, pointer, anchor, and lens validation. When the project needs recurring narrower review modes, you may also create or refresh standalone alternative baseline files and should ask whether each alternative should be derived from the existing primary baseline or start fresh. Use the conversation update_plan tool at the start and after each major baseline phase, keep a short conversation-visible plan/progress list updated so the user can see what is happening, and treat those updates as non-blocking status signals rather than approval checkpoints."
