interface:
  display_name: "Review Baseline"
  short_description: "Create or refresh a project review baseline"
  default_prompt: "Create or refresh the project review baseline by discovering broad surfaces, configuring built-in and custom lenses, attaching contract docs, running the quality gate, and writing the persistent baseline document. When the project needs recurring narrower review modes, you may also create or refresh standalone alternative baseline files and should ask whether each alternative should be derived from the existing primary baseline or start fresh."
