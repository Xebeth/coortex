interface:
  display_name: "Coortex Fixer Lane"
  short_description: "Repair one bounded Coortex family lane"
  default_prompt: "Use $coortex-fixer-lane for one bounded repair lane only. Consume one family-local repair slice or one validated lane-continuation packet, repair at the owning seam, run targeted verification, then run lane-local $coortex-review and $coortex-deslop before emitting review_return_handoff. Treat continuation as same-worker thread continuity, not a cue to restart analysis from scratch. Do not spawn subagents and do not commit. Use update_plan for non-blocking conversation-visible plan/progress updates when the lane spans multiple phases."
