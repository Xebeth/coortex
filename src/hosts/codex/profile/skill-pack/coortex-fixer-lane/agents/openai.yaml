interface:
  display_name: "Coortex Fixer Lane"
  short_description: "Repair one bounded Coortex family lane"
  default_prompt: "Use $coortex-fixer-lane for one bounded repair lane only. Consume one family-local repair slice or one validated lane-continuation packet, repair at the owning seam, run targeted verification only, then run lane-local $coortex-review-lane plus $coortex-deslop before emitting review_return_handoff. Do not substitute standalone $coortex-review for worker self-review: it correctly refuses while the parent fixer-orchestrator or review-orchestrator campaign owns the worktree. Resolve sibling helper paths from the installed .codex/skills/coortex-fixer-lane/ directory, not from the repository root. When a continuation packet is present, run ../fixer-orchestrator/scripts/fix_result_state.py validate-lane-continuation as the canonical identity check, treat its result as authoritative, and stop with a protocol error if that helper step cannot run or fails. Treat continuation as same-worker thread continuity, not a cue to restart analysis from scratch. Do not spawn subagents, do not commit, and do not run repo-wide/full-suite broader verification from the lane; broader verification for family-closed belongs to the fixer coordinator."
