interface:
  display_name: "Seam Walkback Review"
  short_description: "Archaeology-driven seam discovery campaign"
  default_prompt: "Use $seam-walkback-review as the discovery phase of a review campaign: walk back pivot commits, extract stable seams, choose logical commit groups, run bounded two-lens read-only discovery over each group, consolidate provisional candidate families, emit a validated discovery packet, and hand the campaign directly to $review-orchestrator in packet-driven exploration mode. Do not repair code, do not run mutating deslop cleanup, and do not commit slices in this mode. Use the bundled walkback helper for inventory, campaign-lock handling, trace records, and packet pathing; use the review-orchestrator helper to validate the emitted packet before handoff. Use the conversation update_plan tool at the start and after each major phase boundary instead of relying only on prose progress. Keep a short conversation-visible plan/progress list updated at phase boundaries so the user can see what is happening. Treat those updates as non-blocking status signals, not approval checkpoints; continue unless the user explicitly asks you to pause or you are genuinely blocked. Do not end with offer-to-continue wording like 'if you want, I can continue' unless a real terminal condition is met. Do not stop with prose like 'the packet is ready' or 'the campaign completed cleanly' before the packet-driven $review-orchestrator exploration phase has completed its own review run. Packet emission alone is not terminal, and handoff completion is not real unless downstream review either ends with NO_ACTIONABLE_FAMILIES or persists the canonical review-handoff.json artifact and traces its path. Surface the packet path, downstream run id, and downstream review_handoff path in the final summary when applicable. Terminal conditions here are explicit user stop, no actionable commit groups remain, a deterministic lock/validation failure, the inability to emit/launch the downstream handoff cleanly, or a completed orchestrator handoff plus terminal walkback record."
