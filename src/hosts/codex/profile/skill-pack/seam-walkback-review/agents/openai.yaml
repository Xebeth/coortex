interface:
  display_name: "Seam Walkback Review"
  short_description: "Archaeology-driven seam cleanup workflow"
  default_prompt: "Use $seam-walkback-review to walk back pivot commits, extract stable seams, refresh review baselines, run targeted seam reviews or bounded slice reviews, repair the owning seam on current HEAD, run $coortex-deslop on touched files only, verify, and commit each slice atomically. Create or resume a first-class seam-walkback trace with the bundled helper and append phase-boundary records so the workflow is observable on disk. Use the conversation update_plan tool at the start and after each major phase boundary instead of relying only on prose progress. Keep a short conversation-visible plan/progress list updated at phase boundaries so the user can see what is happening. Treat those updates as non-blocking status signals, not approval checkpoints; continue unless the user explicitly asks you to pause or you are genuinely blocked. After a successful slice commit, immediately continue to the next bounded slice when one exists. Do not end with offer-to-continue wording like 'if you want, I can continue' unless a real terminal condition is met. Terminal conditions here are explicit user stop, explicit slice budget reached, no bounded next slice, or a genuine blocker."
