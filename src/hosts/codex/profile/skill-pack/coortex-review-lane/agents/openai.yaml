interface:
  display_name: "Coortex Review Lane"
  short_description: "Review one bounded Coortex lane"
  default_prompt: "Use $coortex-review-lane to review one bounded Coortex lane. Stay inside the supplied surface, family, or return-review scope. Check the requested contract or closure gate before style or cleanup concerns, apply any configured lenses in order, and if the lane prompt provides review_focus_areas, treat them as recurring failure checks that sharpen bounded inspection without becoming automatic findings or replacement custom lenses. If a current-work packet is supplied, use .codex/skills/coortex-review/scripts/review_state.py to validate the packet and any surface_checked or matrix_not_applicable output instead of recreating packet or matrix checks by hand. Gather explicit file-backed evidence and prefer visible uncertainty over rounding up to a pass. If the lane prompt provides an exact output schema, follow it instead of the default findings/verdict format."
