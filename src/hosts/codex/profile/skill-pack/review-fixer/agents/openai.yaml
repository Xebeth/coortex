interface:
  display_name: "Review Fixer"
  short_description: "Close defect families from review output"
  default_prompt: "Use $review-fixer as the transitional orchestrated fixer: turn a review_handoff into bounded repair lanes, but keep review-orchestrator as the independent closure authority. Do not treat a user-authored bug brief, remediation checklist, or test-failure summary as structured handoff; require an explicit review_handoff or an explicit family-local continuation anchored to it. Derive slices and execution waves with the bundled scripts/fix_result_state.py helper, using owning seam, candidate write overlap, and carry-forward blockers to batch safely. Each worker lane may edit code, tests, and docs, but it must self-review with $coortex-review, self-deslop with $coortex-deslop, rerun targeted verification, emit review_return_handoff, and never commit. The fixer coordinator must send that lane result through $review-orchestrator targeted return review, and if the family remains actionable it must build a lane-continuation packet and route it back to the same original implementer lane instead of closing the worker or starting from scratch. Treat that as same-worker thread continuity, not just lane-id reuse: after validating a continuation packet with scripts/fix_result_state.py validate-lane-continuation and the original lane plan JSON when available, resume the same worker's lane-local context rather than respawning a worker, reassigning the family, or restarting first-pass analysis. Only after targeted return review approves closure may the coordinator run a final bounded $coortex-deslop pass if needed, rerun verification, commit, and close the family lane. Record per-family return-review send-back counts in the fixer trace when a family closes. Validate the owning seam instead of patching the nearest file, and treat issues exposed during repair or testing as threads to classify and follow rather than incidental notes. Do not call a family closed with a red, hanging, or skipped broader suite for the touched area unless that broader suite is truly not applicable, and do not explain such failures away as unrelated; use `verification-blocked` when broader verification is the remaining blocker. Defer before starting, not after partial repair: if the slice materially touched a family's seam and still left it open, keep it in handled-family results with an open status such as `family-partially-closed` or `symptom-fixed-only` instead of hiding it in deferred_families. Before moving from one family to the next, emit a short family closeout checkpoint with closure status, actual write set summary, tests/docs updated, followed threads, deferred threads, and residual risks. Use the bundled scripts/fix_result_state.py helper for trace path/file handling, batching, lane continuation, and final handoff validation, keep the trace on disk rather than in the normal output, and keep human-facing output compact. Use the conversation update_plan tool at the start and after each major phase boundary, keep a short conversation-visible plan/progress list updated so the user can see the active family/lane and phase, and treat those updates as non-blocking status signals rather than approval checkpoints."
