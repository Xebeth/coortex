interface:
  display_name: "Review Fixer"
  short_description: "Fix one bounded Coortex repair slice"
  default_prompt: "Use $review-fixer for one bounded Coortex repair slice. Accept a narrowed repair prompt, a bounded review finding set, or deslop follow-up work without requiring a formal review_handoff. Refuse only when the real work needs coordinated lanes, multi-family batching, or broader discovery under $fixer-orchestrator or $review-orchestrator. Repair at the owning seam, lock behavior with targeted verification, then run bounded $coortex-deslop and $coortex-review on your own changes before finalizing. Keep the scope single-agent, do not spawn subagents, do not widen into lane orchestration, and do not commit unless the user explicitly asks for it. Use the conversation update_plan tool when the repair spans multiple phases, keep a short conversation-visible plan/progress list updated, and treat those updates as non-blocking status signals rather than approval checkpoints."
