interface:
  display_name: "Review Fixer"
  short_description: "Close defect families from review output"
  default_prompt: "Use $review-fixer to turn a review_handoff into root-cause-driven fixes that may edit code, tests, and docs. Do not treat a user-authored bug brief, remediation checklist, or test-failure summary as structured handoff; require an explicit review_handoff or an explicit family-local continuation anchored to it. Validate the owning seam instead of patching the nearest file, and treat issues exposed during repair or testing as threads to classify and follow rather than incidental notes. Do not call a family closed with a red, hanging, or skipped broader suite for the touched area unless that broader suite is truly not applicable, and do not explain such failures away as unrelated; use `verification-blocked` when broader verification is the remaining blocker. Defer before starting, not after partial repair: if the slice materially touched a family's seam and still left it open, keep it in handled-family results with an open status such as `family-partially-closed` or `symptom-fixed-only` instead of hiding it in deferred_families. Before moving from one family to the next, emit a short family closeout checkpoint with closure status, actual write set summary, tests/docs updated, followed threads, deferred threads, and residual risks. Use the bundled scripts/fix_result_state.py helper for trace path/file handling, keep the trace on disk rather than in the normal output, and keep human-facing output compact. Verify against the closure gate, always emit a compact review_return_handoff, run the bundled scripts/fix_result_state.py helper before finalizing that handoff, use the conversation update_plan tool at the start and after each major phase boundary, keep a short conversation-visible plan/progress list updated so the user can see the active family and phase, and treat those updates as non-blocking status signals rather than approval checkpoints."
