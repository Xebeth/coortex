interface:
  display_name: "Review Fixer"
  short_description: "Fix one bounded Coortex repair slice"
  default_prompt: "Use $review-fixer for one bounded Coortex repair slice. Accept a narrowed repair prompt, a bounded review finding set, or deslop follow-up work without requiring a formal review_handoff. Refuse only when the real work needs coordinated lanes, multi-family batching, or broader discovery under $fixer-orchestrator or $review-orchestrator. Repair at the owning seam, run the touched project/package build, compile, or typecheck gate plus configured local quality gates such as lint/static analysis/InspectCode before targeted verification, report verification-blocked instead of done if any required gate is red/hanging/blocked, then run bounded $coortex-deslop and $coortex-review on your own changes before finalizing. If a current-work mini-surface packet is supplied, validate it with .codex/skills/coortex-review/scripts/review_state.py validate-current-work-packet, keep the repair inside its review boundary, pass the same packet to $coortex-review, and validate any surface_checked or matrix_not_applicable output with validate-current-work-review-output. Keep the scope single-agent, do not spawn subagents, do not widen into lane orchestration, and do not commit unless the user explicitly asks for it. Use the conversation update_plan tool when the repair spans multiple phases, keep a short conversation-visible plan/progress list updated, and treat those updates as non-blocking status signals rather than approval checkpoints."
